name: Release

on:
  push:
    tags:
      - 'v*'
  # Manual trigger: lets you pick a frontend version without bumping the repo Variable.
  workflow_dispatch:
    inputs:
      frontend_version:
        description: 'Frontend release tag (overrides vars.FRONTEND_VERSION)'
        required: false
        default: ''

permissions:
  contents: write
  packages: write

env:
  # Resolution order:
  #   1) workflow_dispatch input (manual one-off)
  #   2) repository Variable `FRONTEND_VERSION` (https://github.com/buggregator/server/settings/variables/actions)
  #   3) hardcoded fallback so the workflow still works on forks without the Variable set.
  FRONTEND_VERSION: ${{ inputs.frontend_version || vars.FRONTEND_VERSION || '1.32.0' }}
  PHP_VERSION: "8.4.19"

jobs:
  build-unix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            spc_os: linux
            spc_arch: x86_64
          - goos: linux
            goarch: arm64
            spc_os: linux
            spc_arch: aarch64
          - goos: darwin
            goarch: amd64
            spc_os: macos
            spc_arch: x86_64
          - goos: darwin
            goarch: arm64
            spc_os: macos
            spc_arch: aarch64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      # Download frontend
      - name: Download frontend
        run: |
          mkdir -p internal/frontend/dist
          ASSET_URL=$(curl -s "https://api.github.com/repos/buggregator/frontend/releases/tags/${FRONTEND_VERSION}" \
            | jq -r '.assets[0].url')
          curl -sL -H "Accept: application/octet-stream" "$ASSET_URL" -o /tmp/frontend.zip
          unzip -qo /tmp/frontend.zip -d internal/frontend/dist/

      # Build PHP VarDumper parser using pre-built micro.sfx from static-php CDN
      - name: Build VarDumper PHP binary
        run: |
          cd php/vardumper
          composer install --no-dev --optimize-autoloader --quiet
          curl -sL https://github.com/box-project/box/releases/download/4.6.6/box.phar -o box.phar
          php box.phar compile --quiet
          curl -sL "https://dl.static-php.dev/static-php-cli/common/php-${PHP_VERSION}-micro-${{ matrix.spc_os }}-${{ matrix.spc_arch }}.tar.gz" \
            -o /tmp/micro.tar.gz
          mkdir -p /tmp/micro && tar -xzf /tmp/micro.tar.gz -C /tmp/micro/
          mkdir -p ../../modules/vardumper/bin
          cat /tmp/micro/micro.sfx vardumper-parser.phar > ../../modules/vardumper/bin/vardumper-parser-${{ matrix.goos }}-${{ matrix.goarch }}
          chmod +x ../../modules/vardumper/bin/vardumper-parser-${{ matrix.goos }}-${{ matrix.goarch }}

      # Build Go binary
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          go build -ldflags="-s -w -X main.version=${VERSION}" -o buggregator-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/buggregator

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: buggregator-${{ matrix.goos }}-${{ matrix.goarch }}
          path: buggregator-${{ matrix.goos }}-${{ matrix.goarch }}

  # Windows build.
  #
  # VarDumper is not available on Windows: static-php-cli does not ship a
  # `micro.sfx` for Windows, so we can't bundle a standalone PHP runtime, and
  # `box.phar` itself cannot reliably detect composer on the Windows runner
  # (https://github.com/box-project/box/issues/1097). The Go server gates
  # var-dump on `runtime.GOOS != "windows"` so the binary still boots — every
  # other module (Sentry, SMTP, Monolog, Ray, Inspector, Profiler, HTTP-dump,
  # SMS) works normally. The embedded vardumper binary is a stub byte so
  # `go:embed bin/vardumper-parser-windows-amd64.exe` succeeds.
  build-windows:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download frontend
        run: |
          mkdir -p internal/frontend/dist
          ASSET_URL=$(curl -s "https://api.github.com/repos/buggregator/frontend/releases/tags/${FRONTEND_VERSION}" \
            | jq -r '.assets[0].url')
          curl -sL -H "Accept: application/octet-stream" "$ASSET_URL" -o /tmp/frontend.zip
          unzip -qo /tmp/frontend.zip -d internal/frontend/dist/

      - name: Create VarDumper placeholder
        run: |
          mkdir -p modules/vardumper/bin
          echo 'placeholder' > modules/vardumper/bin/vardumper-parser-${{ matrix.goos }}-${{ matrix.goarch }}.exe

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          # workflow_dispatch builds don't have a v* tag — fall back to "dev".
          if [ -z "$VERSION" ] || [ "$VERSION" = "$GITHUB_REF_NAME" ]; then
            VERSION="dev"
          fi
          go build -ldflags="-s -w -X main.version=${VERSION}" -o buggregator-${{ matrix.goos }}-${{ matrix.goarch }}.exe ./cmd/buggregator

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: buggregator-${{ matrix.goos }}-${{ matrix.goarch }}
          path: buggregator-${{ matrix.goos }}-${{ matrix.goarch }}.exe

  docker:
    runs-on: ubuntu-latest
    needs: build-unix
    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_LOGIN }}
          password: ${{ secrets.GHCR_PASSWORD }}

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Docker meta (Docker Hub)
        id: meta-dockerhub
        uses: docker/metadata-action@v5
        with:
          images: |
            butschster/buggregator
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.tags }}
            ${{ steps.meta-dockerhub.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            FRONTEND_VERSION=${{ env.FRONTEND_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    # Only attach binaries to the GitHub Release on a tag push; the manual
    # workflow_dispatch path is for ad-hoc CI builds (artifacts only).
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: [build-unix, build-windows]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*/buggregator-*
          generate_release_notes: true
